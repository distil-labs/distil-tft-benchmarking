base:
  task: multi-turn-tool-calling-closed-book
  student_model_name: Qwen3-1.7B
  teacher_model_name: zai.glm-5

trace_processing:
  observation_format: openai_messages
  convert_to_single_turn: false
  teacher_model_name: zai.glm-5
  num_traces_as_training_base: 80
  num_traces_as_testing_base: 80
  min_generated_examples: 0

synthgen:
  generation_in_single_call: 1
  generation_target: 2000
  validation_max_total_length: 15000
  mutation_topics:
    - short conversation (9-13 turns total); FindRestaurants is called early, within the first 1-3 turns
    - short-medium conversation (13-17 turns total); FindRestaurants is called within the first 5 turns
    - medium conversation (15-19 turns total); includes both FindRestaurants and ReserveRestaurant
    - long conversation (21-29 turns total); full search, discussion, and reservation flow
    - multiple searches; the user is not satisfied with the first results and triggers FindRestaurants again with different parameters
